<!DOCTYPE html>
<html lang="es">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<link rel="stylesheet" href="style/style.css">
</head>

<body>

<audio id="bg" loop>
<source src="audio/suspenso.mp3">
</audio>

<div class="scene">
<img src="https://i.pinimg.com/736x/e6/29/69/e629699282cc2c4f005a4611e2c1265b.jpg">

<div class="overlay">
<h1>NO ESTÁS SOLA</h1>
<p id="texto"></p>

<div class="options">
<a href="escena2a.html" onclick="transicion(event)">Mirar atrás →</a>
<a href="escena2b.html" onclick="transicion(event)">Correr →</a>
</div>

</div>
</div>

<script>
// TEXTO
let t="Algo respira detrás de ti...";
let i=0;
(function escribir(){
if(i<t.length){
document.getElementById("texto").innerHTML+=t[i++];
setTimeout(escribir,50);
}})();

// AUDIO
document.addEventListener("click",()=>{
let a=document.getElementById("bg");
a.volume=0.25;
a.play();
},{once:true});

// TRANSICIÓN
function transicion(e){
e.preventDefault();
document.body.classList.add("fade-out");
setTimeout(()=>{window.location=e.target.href},500);
}

// FINAL SECRETO
let clicks=0;
document.addEventListener("click",()=>{
clicks++;
if(clicks===10){
let audio=new Audio("audio/suspenso.mp3");
audio.volume=1;
audio.play();

document.body.innerHTML=`
<div id="pantalla" style="background:black;color:red;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:monospace;">
<h1 id="mensaje" style="font-size:70px;"></h1>
</div>`;

let txt="TE ENCONTRE";
let j=0;

function escribir2(){
if(j<txt.length){
document.getElementById("mensaje").innerHTML+=txt[j++];
setTimeout(escribir2,120);
}}
setTimeout(escribir2,500);

setInterval(()=>{
document.getElementById("pantalla").style.transform=
`translate(${Math.random()*10-5}px,${Math.random()*10-5}px)`;
},80);

setTimeout(()=>{window.location="index.html"},7000);
}
});
<script>
function hablar(texto) {
  let voz = new SpeechSynthesisUtterance(texto);

  voz.lang = "es-ES";
  voz.rate = 0.7;
  voz.pitch = 0.4; // más grave = creepy
  voz.volume = 1;

  speechSynthesis.speak(voz);
}
</script>

</body>
</html>
